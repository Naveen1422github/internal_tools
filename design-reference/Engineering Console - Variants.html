<style>
html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Inter Tight', system-ui; }
#root { height: 100vh; }
.iframe-art {
  width: 100%; height: 100%; border: none; display: block; background: #0d0f14;
}
</style>

<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="variants/squad-codex.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Root() {
  return (
    <DesignCanvas>
      <DCSection
        id="approaches"
        title="Engineering Console · Three Approaches"
        subtitle="Three takes on the same problem — pick & mix, or compare side by side."
      >
        <DCArtboard id="primary" label="A · Workspace + Terminals (primary)" width={1440} height={900}>
          <iframe className="iframe-art" src="Engineering Console.html" title="Primary console"/>
        </DCArtboard>

        <DCArtboard id="terminal-first" label="B · Terminal-first (same app, layout=terminal-first)" width={1440} height={900}>
          <iframe className="iframe-art" src="Engineering Console.html?layout=terminal-first" title="Terminal-first"/>
        </DCArtboard>

        <DCArtboard id="squad" label="C · Squad / Codex hybrid (TUI-flavored)" width={1440} height={900}>
          <SquadCodex/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
