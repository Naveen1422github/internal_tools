<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emp1st | Engineering Console</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-terminal.css">
    <link rel="stylesheet" href="styles-overlays.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="app.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0d1117',
                        panel: '#161b22',
                        'panel-light': '#21262d',
                        border: '#30363d',
                        accent: '#58a6ff',
                        success: '#238636',
                        danger: '#da3633',
                        warning: '#d29922',
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        /* Override some handoff styles to play nice with Tailwind */
        .app { height: 100%; position: relative; }
        .canvas { flex: 1; min-width: 0; }
    </style>
</head>
<body x-data="consoleApp()" x-init="init()" class="h-full bg-dark text-gray-300 font-sans selection:bg-accent/30 selection:text-white flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-16 border-r border-border bg-panel flex flex-col items-center py-6 space-y-8 z-30 shadow-2xl">
        <div class="text-accent font-bold text-2xl tracking-tighter">◈</div>
        <nav class="flex flex-col space-y-4">
            <button @click="switchTab('profiles')" :class="tab === 'profiles' ? 'text-accent bg-accent/10 shadow-inner' : 'text-gray-500 hover:text-gray-300'" class="p-3 rounded-xl transition-all group relative">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span class="absolute left-full ml-4 px-2 py-1 bg-panel border border-border text-[10px] font-bold text-white rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 whitespace-nowrap">Identities</span>
            </button>
            <button @click="switchTab('collab')" :class="tab === 'collab' ? 'text-accent bg-accent/10 shadow-inner' : 'text-gray-500 hover:text-gray-300'" class="p-3 rounded-xl transition-all group relative">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span class="absolute left-full ml-4 px-2 py-1 bg-panel border border-border text-[10px] font-bold text-white rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 whitespace-nowrap">Collaboration</span>
            </button>
            <button @click="switchTab('console')" :class="tab === 'console' ? 'text-accent bg-accent/10 shadow-inner' : 'text-gray-500 hover:text-gray-300'" class="p-3 rounded-xl transition-all group relative">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="absolute left-full ml-4 px-2 py-1 bg-panel border border-border text-[10px] font-bold text-white rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 whitespace-nowrap">Console</span>
            </button>
        </nav>
        <div class="mt-auto">
            <button @click="refresh()" class="p-3 text-gray-600 hover:text-accent transition-colors" :class="loading ? 'animate-spin' : ''">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col min-w-0 bg-dark relative">
        
        <!-- Header (Standard) -->
        <header x-show="tab !== 'console'" class="h-14 border-b border-border flex items-center px-6 justify-between bg-panel/50 backdrop-blur-md sticky top-0 z-20">
            <div class="flex items-center space-x-6">
                <span class="text-xs font-black uppercase tracking-[0.2em] text-gray-500" x-text="tab === 'profiles' ? 'Identity Management' : 'Knowledge & Memory'"></span>
                
                <template x-if="tab === 'collab'">
                    <nav class="flex space-x-4 border-l border-border pl-6">
                        <button @click="subTab = 'entries'; refreshCollabData()" :class="subTab === 'entries' ? 'text-accent border-b-2 border-accent' : 'text-gray-500'" class="text-[10px] font-bold uppercase tracking-widest py-4 transition-all">Entries</button>
                        <button @click="subTab = 'tasks'; refreshCollabData()" :class="subTab === 'tasks' ? 'text-accent border-b-2 border-accent' : 'text-gray-500'" class="text-[10px] font-bold uppercase tracking-widest py-4 transition-all">Board</button>
                        <button @click="subTab = 'modules'; refreshCollabData()" :class="subTab === 'modules' ? 'text-accent border-b-2 border-accent' : 'text-gray-500'" class="text-[10px] font-bold uppercase tracking-widest py-4 transition-all">Modules</button>
                    </nav>
                </template>
            </div>
            
            <div class="flex items-center space-x-4">
                <template x-if="loading">
                    <span class="flex items-center space-x-2 bg-accent/10 px-3 py-1 rounded-full border border-accent/20">
                        <span class="w-2 h-2 bg-accent rounded-full animate-pulse"></span>
                        <span class="text-[9px] text-accent font-black uppercase tracking-tighter">Synchronizing</span>
                    </span>
                </template>
                <div class="flex space-x-2">
                    <template x-if="tab === 'profiles'">
                        <button @click="openSaveDialog()" class="text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-lg bg-accent text-white hover:bg-blue-600 transition-all shadow-lg shadow-accent/20">Initialize Identity</button>
                    </template>
                    <template x-if="tab === 'collab'">
                        <div class="flex space-x-2">
                            <button @click="runDoctor()" title="Run schema + data integrity checks"
                                    class="text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-lg bg-panel-light border border-border text-gray-300 hover:text-white hover:border-accent transition-all">Doctor</button>
                            <div class="relative" x-data="{ open: false }">
                                <button @click="open = !open" @click.away="open = false"
                                        class="text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-lg bg-panel-light border border-border text-gray-300 hover:text-white hover:border-accent transition-all">Export ▾</button>
                                <div x-show="open" x-cloak class="absolute right-0 mt-1 w-32 bg-panel border border-border rounded-lg shadow-xl z-50">
                                    <button @click="exportData('json'); open=false" class="w-full text-left px-4 py-2 text-[10px] font-black uppercase tracking-widest text-gray-300 hover:bg-panel-light">JSON</button>
                                    <button @click="exportData('markdown'); open=false" class="w-full text-left px-4 py-2 text-[10px] font-black uppercase tracking-widest text-gray-300 hover:bg-panel-light">Markdown</button>
                                </div>
                            </div>
                            <button @click="subTab === 'entries' ? createEntry() : (subTab === 'tasks' ? createTask() : createModule())"
                                    class="text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-lg bg-accent text-white hover:bg-blue-600 transition-all shadow-lg shadow-accent/20">
                                + <span x-text="subTab === 'entries' ? 'Log Entry' : (subTab === 'tasks' ? 'New Task' : 'New Module')"></span>
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </header>

        <!-- Viewport -->
        <div class="flex-1 overflow-hidden flex">
            
            <!-- PROFILES VIEW -->
            <div x-show="tab === 'profiles'" x-cloak class="flex-1 overflow-y-auto p-10 custom-scrollbar">
                <!-- (Existing Profiles UI - truncated for brevity but kept in mind) -->
                <div class="max-w-7xl mx-auto space-y-12">
                    <!-- Stats -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                        <div class="bg-panel p-8 rounded-3xl border border-border shadow-inner group transition-all hover:border-accent/30">
                            <div class="text-[9px] font-black uppercase text-gray-500 tracking-[0.25em] mb-6">Active Terminal</div>
                            <div class="text-3xl font-black text-accent font-mono truncate" x-text="state?.active_profile || 'ROOT'"></div>
                        </div>
                        <div class="bg-panel p-8 rounded-3xl border border-border shadow-inner">
                            <div class="text-[9px] font-black uppercase text-gray-500 tracking-[0.25em] mb-6">Available Nodes</div>
                            <div class="text-3xl font-black text-success font-mono" x-text="getReadyCount()"></div>
                        </div>
                        <div class="bg-panel p-8 rounded-3xl border border-border shadow-inner">
                            <div class="text-[9px] font-black uppercase text-gray-500 tracking-[0.25em] mb-6">Neutralizing</div>
                            <div class="text-3xl font-black text-warning font-mono" x-text="getCooldownCount()"></div>
                        </div>
                        <div class="bg-panel p-8 rounded-3xl border border-border shadow-inner flex flex-col justify-between">
                            <div>
                                <div class="text-[9px] font-black uppercase text-gray-500 tracking-[0.25em] mb-4">Total Inventory</div>
                                <div class="text-3xl font-black text-white font-mono" x-text="Object.keys(state?.profiles || {}).length"></div>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button @click="pickNext()" class="flex-1 text-[10px] font-bold text-accent uppercase tracking-widest border border-accent/20 px-4 py-2 rounded hover:bg-accent/5 transition-all">Auto-Rotate</button>
                                <button @click="checkAll()" class="flex-1 text-[10px] font-bold text-gray-300 uppercase tracking-widest border border-border px-4 py-2 rounded hover:border-accent hover:text-accent transition-all">Probe All</button>
                            </div>
                        </div>
                    </div>

                    <!-- Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                        <template x-for="[name, p] in Object.entries(state?.profiles || {})" :key="name">
                            <div class="bg-panel rounded-[2rem] border transition-all duration-500 overflow-hidden group shadow-lg"
                                 :class="state.active_profile === name ? 'border-accent ring-4 ring-accent/5 shadow-accent/10' : 'border-border hover:border-gray-600 hover:shadow-2xl'">
                                <div class="p-8">
                                    <div class="flex justify-between items-start mb-8">
                                        <div>
                                            <h3 class="text-xl font-black text-white italic tracking-tighter" x-text="name"></h3>
                                            <p class="text-xs text-gray-500 mt-2 font-medium tracking-wide" x-text="p.label || 'Standard Identity'"></p>
                                        </div>
                                        <span :class="isAvailable(p) ? 'status-done' : 'status-warning'" class="text-[9px] font-black uppercase px-2.5 py-1 rounded-lg tracking-[0.15em]" x-text="isAvailable(p) ? 'Ready' : 'Cooldown'"></span>
                                    </div>
                                    <div class="space-y-4 mb-8">
                                        <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-gray-600">
                                            <span>Validation</span>
                                            <span :class="p.check_ok ? 'text-success' : 'text-danger'" x-text="p.check_ok ? 'Verified' : 'Unverified'"></span>
                                        </div>
                                        <div class="bg-dark/40 p-4 rounded-2xl border border-border/50 text-[11px] font-mono space-y-2">
                                            <div class="flex justify-between"><span class="text-gray-600">Last Seen:</span><span class="text-gray-300" x-text="formatRelTime(p.last_activated)"></span></div>
                                            <div class="flex justify-between" x-show="p.last_checked"><span class="text-gray-600">Last Probe:</span><span class="text-gray-300" x-text="formatRelTime(p.last_checked)"></span></div>
                                            <div class="flex justify-between" x-show="p.check_message"><span class="text-gray-600">Probe Result:</span><span :class="p.check_ok ? 'text-success' : 'text-warning'" class="truncate ml-2 max-w-[180px]" x-text="p.check_message"></span></div>
                                        </div>
                                    </div>
                                    <div class="flex gap-3">
                                        <button @click="activate(name)" x-show="state.active_profile !== name" class="flex-1 bg-accent text-white text-[10px] font-black uppercase tracking-widest py-3 rounded-xl shadow-lg shadow-accent/20 hover:scale-[1.02] transition-all active:scale-95">Engage</button>
                                        <button @click="check(name)" class="px-5 py-3 bg-panel-light text-[10px] font-black uppercase tracking-widest rounded-xl border border-border hover:border-gray-500 text-gray-300 transition-all">Probe</button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- COLLAB VIEW -->
            <div x-show="tab === 'collab'" x-cloak class="flex-1 flex overflow-hidden">
                <!-- (Existing Collab UI) -->
                <!-- Master List -->
                <div class="w-[400px] border-r border-border flex flex-col bg-panel/30 backdrop-blur-sm z-10 shadow-2xl">
                    <div class="p-6 space-y-4 border-b border-border">
                        <template x-if="subTab === 'entries'">
                            <div class="space-y-3">
                                <div class="relative group">
                                    <input type="text" x-model="collabSearch" @keydown.enter="searchCollab()" placeholder="Filter entries..."
                                           class="w-full bg-dark border border-border rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:border-accent outline-none transition-all shadow-inner group-focus-within:ring-4 ring-accent/5">
                                </div>
                            </div>
                        </template>
                        <template x-if="subTab === 'tasks'">
                            <div class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">Live Engineering Board</div>
                        </template>
                    </div>
                    <div class="flex-1 overflow-y-auto custom-scrollbar divide-y divide-border/20">
                        <template x-if="subTab === 'entries'">
                            <template x-for="r in collabResults" :key="r.id">
                                <div @click="viewEntry(r.id)" class="p-6 cursor-pointer transition-all border-l-4 border-transparent"
                                     :class="activeEntryId === r.id ? 'bg-accent/5 border-accent' : 'hover:bg-panel-light/30'">
                                    <h4 class="text-sm font-black text-white truncate" x-text="r.title"></h4>
                                    <div class="text-[11px] text-gray-500 line-clamp-2 mt-2" x-html="r.snippet || r.summary"></div>
                                </div>
                            </template>
                        </template>
                        <template x-if="subTab === 'tasks'">
                            <template x-for="t in collabTasks" :key="t.id">
                                <div @click="viewTask(t)" class="p-6 cursor-pointer transition-all border-l-4 border-transparent"
                                     :class="activeTaskId === t.id ? 'bg-accent/5 border-accent' : 'hover:bg-panel-light/30'">
                                    <div class="flex items-center space-x-2">
                                        <span class="text-[10px] font-black font-mono text-accent" x-text="t.id"></span>
                                        <h4 class="text-sm font-black text-white truncate" x-text="t.title"></h4>
                                    </div>
                                </div>
                            </template>
                        </template>
                    </div>
                </div>
                <!-- Detail View -->
                <div class="flex-1 flex flex-col bg-dark overflow-hidden">
                    <template x-if="activeEntryId">
                        <div class="p-8 overflow-y-auto">
                            <h2 class="text-4xl font-black text-white mb-5 italic" x-text="activeEntry.title"></h2>
                            <div class="prose prose-invert max-w-4xl font-mono text-sm leading-relaxed whitespace-pre-wrap text-gray-300" x-text="activeEntry.description"></div>
                        </div>
                    </template>
                    <template x-if="activeTaskId">
                        <div class="p-8 overflow-y-auto">
                            <h2 class="text-4xl font-black text-white mb-5 italic" x-text="activeTask.title"></h2>
                            <div class="prose prose-invert max-w-4xl font-mono text-sm leading-relaxed whitespace-pre-wrap text-gray-300" x-text="activeTask.description"></div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- CONSOLE VIEW (ENGINEERING CONSOLE PORT) -->
            <div x-show="tab === 'console'" x-cloak class="flex-1 flex flex-col overflow-hidden app" :data-theme="consoleTheme" :data-density="consoleDensity" :data-layout="consoleLayout">
                <!-- Console Titlebar -->
                <header class="titlebar">
                    <div class="tb-traffic"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
                    <div class="tb-workspace">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                        <span>frontend2</span>
                        <span class="crumb-sep">/</span>
                        <span class="crumb-svc" x-text="activeSession?.activeTaskId ? '@' + (tasks.find(x => x.id === activeSession.activeTaskId)?.module || 'workspace') : 'workspace'"></span>
                    </div>
                    <div class="tb-spacer"></div>
                    <div class="tb-agents">
                        <div class="tb-agent" data-agent="claude">
                            <span class="pulse"></span>Claude · active
                        </div>
                        <div class="tb-agent cooldown" data-agent="codex">
                            <span class="pulse"></span>Codex · 2h
                        </div>
                        <div class="tb-agent" data-agent="gemini">
                            <span class="pulse"></span>Gemini · ready
                        </div>
                    </div>
                    <button class="tb-cmdk" @click="cmdkOpen = true">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <span>Search tasks, run with agent…</span>
                        <kbd>⌘K</kbd>
                    </button>
                </header>

                                <div class="flex-1 flex overflow-hidden relative">
                    <!-- Activity Bar -->
                    <nav class="actbar w-12 border-r border-border bg-panel flex flex-col items-center py-2 gap-1 shrink-0 z-20">
                        <button :class="activitySection === 'files' ? 'active' : ''" title="Files" @click="activitySection = 'files'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="20" height="20"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6z"/><path d="M14 3v6h6"/></svg></button>
                        <button :class="activitySection === 'tasks' ? 'active' : ''" title="Tasks" @click="activitySection = 'tasks'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
                            <span class="badge" x-text="tasks.filter(t => t.status === 'in-progress').length"></span>
                        </button>
                        <button :class="activitySection === 'modules' ? 'active' : ''" title="Modules" @click="activitySection = 'modules'; loadModules()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></button>
                        <button :class="activitySection === 'terminals' ? 'active' : ''" title="Terminals" @click="activitySection = 'terminals'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9l3 3-3 3M13 15h4"/></svg></button>
                        <span class="spacer flex-1"></span>
                        <button title="Settings" @click="window.dispatchEvent(new CustomEvent('toggle-tweaks'))"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg></button>
                    </nav>

                    <!-- Console Sidebar -->
                    <aside class="sidebar w-[280px] shrink-0 border-r border-border overflow-y-auto bg-[#0d0f14] custom-scrollbar">

                        <!-- Files View -->
                        <div x-show="activitySection === 'files'" class="sb-section tree h-full flex flex-col">
                            <div class="sb-header flex justify-between px-3 py-2 border-b border-border bg-panel text-xs text-gray-500 font-bold uppercase tracking-wider">
                                <span>Workspace</span>
                                <div class="actions flex gap-1">
                                    <button class="hover:text-white" title="New file"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M12 5v14M5 12h14"/></svg></button>
                                    <button class="hover:text-white" title="More"><svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><circle cx="6" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="18" cy="12" r="1.6"/></svg></button>
                                </div>
                            </div>
                            <div class="tree-list flex-1 overflow-y-auto p-2">
                                <div class="tree-row open" style="padding-left: 6px;">
                                    <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></span>
                                    <span class="icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 6a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"/></svg></span>
                                    <span class="name">frontend2</span>
                                </div>
                                <div class="tree-row leaf" style="padding-left: 18px;">
                                    <span class="chev" style="visibility:hidden"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></span>

                            </template>
                            <template x-for="s in (selectedTask?.services || [])" :key="s">
                                <span class="svc" x-text="s"></span>
                            </template>
                            <span class="assignee" x-text="selectedTask?.assignee ? '→ ' + selectedTask.assignee : 'unassigned'"></span>
                        </div>
                    </div>
                    <div class="td-actions">
                        <span class="label">Run with</span>
                        <div class="td-action-btns">
                            <template x-for="a in ['Claude', 'Codex', 'Gemini']" :key="a">
                                <button class="td-action" :data-agent="a.toLowerCase()" :style="`--agent-color: ${cmdkMeta[a.toLowerCase()]?.color || '#fb923c'}`" @click="spawnSession(a.toLowerCase(), { task: selectedTask })">
                                    <span class="agent-letter" :style="`background: ${cmdkMeta[a.toLowerCase()]?.color || '#fb923c'}`" x-text="cmdkMeta[a.toLowerCase()]?.letter || a.charAt(0)"></span>
                                    <span x-text="a"></span>
                                </button>
                            </template>
                        </div>
                        <div class="td-secondary-actions">
                            <button class="td-sec" @click="showToast('Copied context envelope')">Copy context envelope</button>
                            <button class="td-sec" @click="showToast('Opened terminal')">Open in terminal at @<span x-text="selectedTask?.module"></span></button>
                            <select class="td-sec" :value="selectedTask?.status" @change="transitionTask(selectedTask.id, $event.target.value)">
                                <template x-for="s in ['pending','assigned','in-progress','review','done']" :key="s">
                                    <option :value="s" x-text="'→ ' + s"></option>
                                </template>
                            </select>
                            <select class="td-sec" :value="selectedTask?.assignee || ''" @change="assignTaskTo(selectedTask.id, $event.target.value)">
                                <option value="">unassigned</option>
                                <option>Claude</option><option>Codex</option><option>Gemini</option><option>User</option>
                            </select>
                        </div>
                    </div>
                    <div class="td-body">
                        <template x-for="(blk, i) in (selectedTask?.body || [])" :key="i">
                            <div>
                                <h4 x-text="blk.h"></h4>
                                <template x-if="blk.p"><p x-text="blk.p"></p></template>
                                <template x-if="blk.list">
                                    <ul>
                                        <template x-for="(it, j) in blk.list" :key="j">
                                            <li x-text="it"></li>
                                        </template>
                                    </ul>
                                </template>
                                <template x-if="blk.code">
                                    <pre style="background:var(--bg-2); border:1px solid var(--line); padding:10px; border-radius:6px; font-family:var(--font-mono); font-size:11.5px; color:var(--text-1); overflow:auto; margin:0;" x-text="blk.code"></pre>
                                </template>
                            </div>
                        </template>
                        <template x-if="!selectedTask?.body || selectedTask.body.length === 0">
                            <p style="color:var(--text-3)">No description.</p>
                        </template>

                        <h4>Activity</h4>
                        <div class="td-activity">
                            <template x-for="(act, i) in (selectedTask?.activity || [])" :key="i">
                                <div class="td-activity-item">
                                    <span class="timestamp" x-text="act.t"></span>
                                    <span>
                                        <span class="actor" x-text="act.a"></span>
                                        <span class="act" x-text="act.act"></span>
                                    </span>
                                </div>
                            </template>
                            <template x-if="!selectedTask?.activity || selectedTask.activity.length === 0">
                                <div style="color:var(--text-3); font-size:11.5px;">No activity yet.</div>
                            </template>
                        </div>
                    </div>
                </div>


        <!-- Identity Modals -->
        <!-- (Keep existing modals) -->
        <div x-show="dialog === 'save-profile'" x-transition x-cloak class="fixed inset-0 z-[100] flex items-center justify-center bg-dark/90 backdrop-blur-xl p-6">
            <div @click.away="dialog = null" class="bg-panel border border-border w-full max-w-xl rounded-[3rem] overflow-hidden shadow-[0_0_100px_rgba(88,166,255,0.15)]">
                <div class="p-12">
                    <h3 class="text-3xl font-black text-white italic tracking-tighter uppercase mb-10">Init Identity</h3>
                    <div class="space-y-8">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-gray-600 tracking-widest mb-3">Internal Identifier (Slug)</label>
                            <input type="text" x-model="formData.name" class="w-full bg-dark border border-border rounded-2xl p-5 text-white font-mono outline-none focus:border-accent text-lg">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase text-gray-600 tracking-widest mb-3">Descriptive Label</label>
                            <input type="text" x-model="formData.label" class="w-full bg-dark border border-border rounded-2xl p-5 text-white outline-none focus:border-accent text-lg">
                        </div>
                    </div>
                </div>
                <div class="bg-panel-light p-8 flex justify-end space-x-6 border-t border-border/50">
                    <button @click="dialog = null" class="px-8 py-3 text-[11px] font-black uppercase text-gray-500 hover:text-white">Abort</button>
                    <button @click="saveCurrent()" class="px-10 py-3 bg-accent text-white rounded-2xl font-black uppercase shadow-2xl shadow-accent/30">Commit Identity</button>
                </div>
            </div>
        </div>

        <!-- Toasts -->
        <div class="fixed bottom-12 right-12 z-[200] space-y-4 pointer-events-none">
            <template x-for="t in toasts" :key="t.id">
                <div x-transition class="flex items-center space-x-5 bg-panel border border-border pl-6 pr-8 py-5 rounded-3xl shadow-2xl pointer-events-auto min-w-[350px]"
                     :class="t.type === 'err' ? 'border-danger/50 shadow-danger/20' : 'border-accent/50 shadow-accent/20'">
                    <div class="w-3 h-3 rounded-full" :class="t.type === 'err' ? 'bg-danger' : 'bg-accent'"></div>
                    <div class="flex-1">
                        <div class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-500" x-text="t.type === 'err' ? 'Signal Error' : 'Signal Notice'"></div>
                        <div class="text-xs font-bold text-white mt-1" x-text="t.msg"></div>
                    </div>
                </div>
            </template>
        </div>

    </main>

</body>
</html>
